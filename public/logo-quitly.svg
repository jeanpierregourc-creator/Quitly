<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A88A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fond sombre arrondi -->
  <rect x="0" y="0" width="220" height="60" rx="10" fill="#080E14"/>

  <!-- Cercle teal -->
  <circle cx="30" cy="30" r="20" fill="url(#grad)" />

  <!-- Feuille blanche -->
  <path d="M30 18 C30 18 21 24 21 32 C21 38 25 42 30 42 C35 42 39 38 39 32 C39 24 30 18 30 18Z"
        fill="white" opacity="0.95"/>
  <path d="M30 42 C30 42 30 32 30 26"
        stroke="#00D4AA" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M30 34 C30 34 24 30 22 27"
        stroke="#00D4AA" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Texte "Quitly" -->
  <text x="60" y="23"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22"
        font-weight="700"
        fill="#00D4AA"
        letter-spacing="-0.5">Quitly</text>

  <!-- Tagline -->
  <text x="61" y="38"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="9.5"
        font-weight="400"
        fill="#8A9BAE"
        letter-spacing="1.8">SEVRAGE CONNECTÉ</text>
</svg>
