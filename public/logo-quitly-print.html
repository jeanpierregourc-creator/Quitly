<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Logo Quitly</title>
  <style>
    body {
      margin: 0;
      padding: 60px;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    h2 {
      color: #374151;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0;
    }
    .logo-dark {
      background: #080E14;
      padding: 30px 50px;
      border-radius: 16px;
    }
    .logo-light {
      background: #f9fafb;
      padding: 30px 50px;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
    }
    @media print {
      body { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="logo-container">

    <h2>Logo Quitly — Version sombre</h2>
    <div class="logo-dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="330" height="90">
        <defs>
          <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00A88A;stop-opacity:1" />
          </linearGradient>
        </defs>
        <rect x="0" y="0" width="220" height="60" rx="10" fill="#080E14"/>
        <circle cx="30" cy="30" r="20" fill="url(#grad1)" />
        <path d="M30 18 C30 18 21 24 21 32 C21 38 25 42 30 42 C35 42 39 38 39 32 C39 24 30 18 30 18Z" fill="white" opacity="0.95"/>
        <path d="M30 42 C30 42 30 32 30 26" stroke="#00D4AA" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M30 34 C30 34 24 30 22 27" stroke="#00D4AA" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <text x="60" y="23" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#00D4AA" letter-spacing="-0.5">Quitly</text>
        <text x="61" y="38" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" font-weight="400" fill="#8A9BAE" letter-spacing="1.8">SEVRAGE CONNECTÉ</text>
      </svg>
    </div>

    <h2>Logo Quitly — Version claire</h2>
    <div class="logo-light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="330" height="90">
        <defs>
          <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00A88A;stop-opacity:1" />
          </linearGradient>
        </defs>
        <circle cx="30" cy="30" r="20" fill="url(#grad2)" />
        <path d="M30 18 C30 18 21 24 21 32 C21 38 25 42 30 42 C35 42 39 38 39 32 C39 24 30 18 30 18Z" fill="white" opacity="0.95"/>
        <path d="M30 42 C30 42 30 32 30 26" stroke="#00A88A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M30 34 C30 34 24 30 22 27" stroke="#00A88A" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <text x="60" y="23" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#080E14" letter-spacing="-0.5">Quitly</text>
        <text x="61" y="38" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" font-weight="400" fill="#6b7280" letter-spacing="1.8">SEVRAGE CONNECTÉ</text>
      </svg>
    </div>

  </div>
</body>
</html>
